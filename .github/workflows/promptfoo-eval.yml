name: Promptfoo Eval

on:
  workflow_dispatch:

jobs:
  eval:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run promptfoo eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: evals
        run: |
          promptfoo eval --no-cache
